<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        dl {
            width: 500px;
            display: grid;
            grid-template-columns: 3fr 9fr;
            background-color: rgb(81, 188, 214);
            padding: 20px;
            border-radius: 10px;
            

        }
        dt {
            background-color: rgb(142, 83, 11);
            color: rgb(3, 68, 47);
            padding: 5px;
            margin-bottom: 10px;
            
            
        }
        dd {
            background-color: rgb(116, 116, 186);
            padding: 5px;
            margin-bottom: 10px;
            
        }    
    </style>
</head>
<body>
    <dl>
    
        <dt>User Name</dt>
        <dd>Arjun</dd>
        <dt>Age</dt>
        <dd>28</dd>
        <dt>city</dt>
        <dd>Hyderbad</dd>
        <dt>married status</dt>
        <dd>un-married</dd>
        <dt>work role</dt>
        <dd>Software</dd>
        
    </dl>
    
</body>
</html>
