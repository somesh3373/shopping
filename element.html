<!DOCTYPE html>

<head>

     <link rel="stylesheet" href=".//node_modules/bootstrap-icons/font/bootstrap-icons.css">
 
    <style>
        p::first-letter {
            font-size: 40px;
            font-weight: bold;
            line-height: 20px;   
            float: left;
        }
        ul {
            list-style: none;
            display: flex;
        }
        li::after {
            content: ">";
            font-size: 20px;
            font-weight: bold;
            padding-left: 10px;
            padding-right: 10px;
            color: aquamarine;
            
        }
        li:last-child::after {
            content: "";
        }
        li {
            font-size: 40px;
            color: blueviolet;
            font-weight: bold;
        }
        p::selection {
            background-color: aquamarine;
            text-decoration: underline;
        }
        
        #txtname:optional+span {
            display: none;
        }
         #txtname:required+span {
             display: inline;
             color: brown;
         }
          #txtname:valid+span {
            display: none;
          }
        
        </style>
 </head>
