<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        }
        .row-2{
            display: flex;

            justify-content: space-between;
            padding-top: 40px;
            padding-bottom: 40px;
        }
    </style>
</head>

    <footer>

            <div class="right-panel">

        </div>
        <div class="row-2">
