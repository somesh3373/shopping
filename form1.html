<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            flex-direction: row;
            justify-content: center;
            background-image: url("./public/images/bg-2.jpg");
            background-size: cover;
        }
        form {
            border: 1px solid rgb(255, 255, 255);
            border-radius: 10px;
            box-shadow: 2px 2px 2px rgb(2 55, 241, 241);
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            
            margin-top: 100px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-control {
            width: 100%;
            height: 30px;
            margin-bottom: 5px;
            background-color: rgb(5, 48, 108);
        }
        .form-label {
            font-weight: bold;
            padding-bottom: 5px;
            display: block;
        }
        .error {
            font-size: 12px;
            color: red;
        }
        .btn-register {
            width: 100%;
            height: 30px;
            background-color: gold;
            border: none;
            border-radius: 5px;
        }
    </style>
     
</head>
<body>
    <form>
        <div class="bi bi-person-circle title">Register User</div>
        <div class="form-group">
            <label class="form-label for="UserName">User Name</label>
            <div>
                <input type="text" name="UserName" class="form-control">
            <div>
            <span class="error">User Name Required</span>
            </div>
            </div>
        </div>
         
        <div class="form-group">
            <label class="form-label for="UserName">Password</label>
            <div>
                <input type="password" name="password" class="form-control">
            <div>
            <span class="error">Password with at least one uppercase letter</span>
            </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label for="City">Your city</label>
            <div>
                <select class="form-control" name="City">
                    <option>select City</option>
                     <option>Delhi</option>
                      <option>Hyderbad</option>
                       <option>Andhara Pradesh</option>
                        <option>UP</option>
                         <option>Arunchal Pradesh</option>
                          <option>J&K</option>
                </select>
             </div>    
            <span class="error">Please select your city</span>
            </div>
            </div>
        </div>
        <div class="form-group">
            <button class="btn-register">Register</button>
        </div>
    </form>
    
</body>
</html>
