<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        UL {
            list-style: NONE;
            display: flex;
            flex-direction: row;

        }
        ul li::after {
            content: '⏩';
            padding-left: 5px;
            padding-right: 5px;
            color: bisque;
            font-size: 14px;
        }
         ul li:last-child::after {
            content:'';
         }
         
        
    </style>
</head>
<body>
   <ul>
    <li>HOME</li> 
    <LI>PROFILE</LI>
    <LI>PROPERTY</LI>
    <LI>DEVICE</LI>
    <LI>SETTINGS</LI>
   </ul>
    </body>
    </html>
