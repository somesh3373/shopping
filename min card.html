<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= initial-scale=1.0">
     <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
     <style>
        body {
            background-image:url('public/images/amazon bg.jpg');
            background-size: cover ;
        }
        .card {
            width: 250px;
            height: 350px;
            border: 2px solid black;
            box-shadow: 2px 2px 2px gray;
            display: flex;
            flex-direction: column;
            justify-content: end;
            padding: 20px;
            margin: 20px;
            align-items: center;
        }
        main {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding-top: 200px;
            
        }
        .women-fashion {
            background-image:url('./images/women.jpg');
            background-size: cover;
        }
     </style>
    </head>
    <body>
    <section> 
        
        <main>
            
            <div class="card women-fashion">
                 
                <div class="card-footer">
                    <div class="title">Ethnic Wear</div>
                    <div class="offer">50-80% OFF</div>
                    <div class="card-title">Shop Now</div>
                </div>
            </div>
            <div class="card men-fashion">
                <div class="card-footer">
                    <div class="title">Power Look</div>
                    <div class="offer">50-70% OFF</div>
                    <div class="card-title">Shop Now</div>
                </div>
            </div>
            <div class="card kids-fashion">
                <div class="card-footer">
                    <div class="title">Kids Wear</div>
                    <div class="offer">40-70% OFF</div>
                    <div class="card-title">Shop Now</div>
                </div>
            </div>
            <div class="card tradition-fashion">
                <div class="card-footer">
                    <div class="title">Traditional Wear</div>
                    <div class="offer">50-70% OFF</div>
                    <div class="card-title">Shop Now</div>
                </div>
            </div>
            
        </main>
        
    </section>
</body>
</html>
